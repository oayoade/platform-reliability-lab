services:
  postgres:
    image: postgres:16-alpine
    container_name: platform-lab-postgres
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: platform_lab
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - platform_lab_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready --username=app_user --dbname=platform_lab"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: platform-lab-backend
    environment:
      DATABASE_URL: postgresql://app_user:app_password@postgres:5432/platform_lab
    ports:
      - "8000:8000"
    networks:
      - platform_lab_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
    container_name: platform-lab-frontend
    ports:
      - "8080:80"
    networks:
      - platform_lab_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --spider http://localhost/"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  platform_lab_network:
    driver: bridge

volumes:
  postgres_data: