apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-lab
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/oayoade/platform-reliability-lab.git
    targetRevision: main
    path: kubernetes/helm/platform-lab
    helm:
      valueFiles:
        - environments/gke-values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: platform-lab-cloud

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true