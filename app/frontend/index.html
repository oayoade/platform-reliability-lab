<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Platform Reliability Lab</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f7f7f7;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 8px;
      max-width: 700px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 16px;
      overflow: auto;
      border-radius: 6px;
    }

    button {
      padding: 10px 14px;
      cursor: pointer;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Platform Reliability Lab</h1>
    <p>This frontend is served by Nginx and talks to the FastAPI backend.</p>

    <button onclick="checkHealth()">Check Backend Health</button>
    <button onclick="checkDatabase()">Check Database</button>
    <button onclick="loadTasks()">Load Tasks</button>

    <h3>Response</h3>
    <pre id="output">Click a button to test the platform.</pre>
  </div>

  <script>
    async function callApi(path) {
      const output = document.getElementById("output");

      try {
        const response = await fetch(path);
        const data = await response.json();
        output.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        output.textContent = "Request failed: " + error;
      }
    }

    function checkHealth() {
      callApi("/api/health");
    }

    function checkDatabase() {
      callApi("/api/db");
    }

    function loadTasks() {
      callApi("/api/tasks");
    }
  </script>
</body>
</html>
